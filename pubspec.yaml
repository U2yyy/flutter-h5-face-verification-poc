name: facedetection
description: "Compare face verification and liveness APIs from multiple cloud providers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  crypto: ^3.0.6
  image_picker: ^1.1.2
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.4.0
  camera: ^0.11.1
  image: ^4.5.4
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
